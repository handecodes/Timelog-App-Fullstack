<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Track your activities and view your progress with our comprehensive training timer page."
    />
    <title>Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#673ab7" />
    <style>
      /* --- CSS Variables for Theming --- */
      :root {
        /* Dark Theme (Default) */
        --bg-color: #263d5c;
        --primary-purple: #6b3b9d;
        --accent-light: #d9d9e9;
        --text-white: #ffffff;
        --text-dark: #324b6b;
        --button-text: #fefefe;
        --graph-bar: #e6e6f5;
        --graph-label: #eaeaf5;
        --shadow-purple: rgba(107, 59, 157, 0.3);

        /* Fonts */
        --font-main: "Bricolage Grotesque", sans-serif;
        --font-header: "Abril Fatface", serif;
      }

      body.lightTheme {
        --bg-color: #f8f7fd;
        --accent-light: #f1e4fc;
        --primary-purple: #5f4c7a;
        --text-white: #203661;
        --text-dark: #000d1fbd;
        --button-text: #ffffff;
        --graph-bar: #b1c8e6;
        --graph-label: #273345;
        --shadow-purple: rgba(165, 122, 219, 0.3);
      }

      /* --- Minimal reset --- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-color);
        font-family: var(--font-main);
        color: var(--text-white);
      }

      /* --- Visually hidden (används direkt) --- */
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* --- Header / Navigation --- */
      .headerContainer {
        display: flex;
        width: 100%;
        margin-bottom: 2rem;
      }

      .headerContainer a,
      .headerContainer button {
        flex: 1;
        height: 3.5rem;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--button-text);
        background-color: var(--primary-purple);
        border-radius: 0 0 1.5rem 1.5rem;
        border: none;
        font-size: 1.1rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      /* --- Dropdown menu (initial state) --- */
      .trackersMenu {
        display: none;
        position: absolute;
        top: 0;
        width: 33.33vw;
        background-color: var(--primary-purple);
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
        padding-top: 4.5rem;
        padding-bottom: 1.5rem;
        border-radius: 0 0 1.5rem 1.5rem;
        list-style: none;
        z-index: 5;
      }

      .trackersMenu li {
        width: 85%;
        padding: 0.75rem;
        background-color: var(--accent-light);
        border-radius: 0.8rem;
        text-align: center;
      }

      .trackersMenu a {
        color: var(--text-dark);
        font-weight: bold;
        text-decoration: none;
      }
    </style>
    <link rel="stylesheet" href="./src/css/variables.css" />
    <link rel="stylesheet" href="./src/css/base.css" />
    <link rel="stylesheet" href="./src/css/components.css" />
    <link rel="stylesheet" href="./src/css/timer.css" />
  </head>
  <body class="training">
    <header>
      <nav class="headerContainer" aria-label="Main Navigation">
        <button
          id="trackersToggle"
          aria-label="tracker menu button"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="trackersMenu"
        >
          TRACKERS
        </button>
        <a href="overviewpage.html" class="nav-link">OVERVIEW</a>
        <a href="settingspage.html" class="nav-link">SETTINGS</a>
      </nav>

      <nav id="trackersMenuContainer">
        <ul
          id="trackersMenu"
          class="trackersMenu"
          aria-label="Select tracker type"
        >
          <li><a href="pomodoromode.html" class="menu-link">Study</a></li>
          <li><a href="trainingmode.html" class="menu-link">Exercise</a></li>
          <li><a href="index.html" class="menu-link">Work</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <!--Timer header-->
      <header class="timerHeaderContainer" aria-labelledby="timerHeading">
        <h1 id="timerHeading">Exercise</h1>
      </header>

      <!--Training Timer-->
      <section class="timer-card" aria-labelledby="trainingTimerArea">
        <h2 class="visually-hidden">Training Timer</h2>
        <time
          class="timeDisplay"
          id="timeDisplay"
          role="status"
          aria-live="polite"
        >
          00:00
        </time>

        <div class="mainControls">
          <button id="playBtn" type="button" aria-label="Start Work Session">
            <i class="fa-solid fa-play"></i>
          </button>
          <button id="pauseBtn" type="button" aria-label="Pause Work Session">
            <i class="fa-solid fa-pause"></i>
          </button>
          <button id="stopBtn" type="button" aria-label="Stop Work Session">
            <i class="fa-solid fa-stop"></i>
          </button>
        </div>
        <div class="trainingControls">
          <button
            id="logSetBtn"
            class="btn-primary"
            type="button"
            aria-label="Log Set"
          >
            SET
          </button>
          <button
            id="logExerciseBtn"
            class="btn-primary"
            type="button"
            aria-label="Log Exercise"
          >
            EXERCISE
          </button>
          <button
            id="clearExerciseBtn"
            class="btn-primary"
            type="button"
            aria-label="Clear exercise counter"
          >
            CLEAR EXERCISE COUNTER
          </button>
        </div>
      </section>

      <section class="trainingLogsContainer" aria-labelledby="trainingLogsArea">
        <h2 id="trainingLogsArea">You're on</h2>
        <div class="logStatsgrid">
          <div class="statsDisplay">
            <time id="totalSet" class="number-card">0</time>
            <span>Set</span>
          </div>

          <div class="statsDisplay">
            <time id="totalExercise" class="number-card">0</time>
            <span>Exercise</span>
          </div>
        </div>
      </section>

      <section
        class="statsContainer"
        aria-labelledby="statsArea"
        data-category="Exercise"
      >
        <h2 id="statsArea">This Week</h2>
        <div class="stats-grid">
          <div class="statsDisplay">
            <time id="totalTime" class="number-card">0h</time>
            <span>Total Time</span>
          </div>

          <div class="statsDisplay">
            <time id="currentSession" class="number-card">0h</time>
            <span>Current Session</span>
          </div>

          <div class="statsDisplay">
            <time id="longestSession" class="number-card">0h</time>
            <span>Longest Session</span>
          </div>
        </div>
      </section>

      <!--Extra time area-->

      <section class="extraTimeContainer" aria-labelledby="extraTimeHeading">
        <h2 id="extraTimeHeading" class="visually-hidden">Extra time area</h2>
        <div class="extraTimeRow">
          <div class="timeUnit">
            <span class="dateLabel">Date</span>
            <label class="dateIcon">
              <i class="fa-regular fa-calendar"></i>
              <input type="date" id="dateInput" aria-label="Select date" />
            </label>
          </div>
          <div class="timeUnit">
            <label for="timeInput">Start Time</label>
            <input type="time" id="timeInput" aria-label="Select time" />
          </div>
          <div class="timeUnit">
            <label for="hoursInput">Hours</label>
            <input
              type="number"
              id="hoursInput"
              inputmode="numeric"
              pattern="[0-9]*"
              min="0"
              max="99"
              value="0"
            />
          </div>
          <div class="timeUnit">
            <label for="minutesInput">Minutes</label>
            <input
              type="number"
              id="minutesInput"
              inputmode="numeric"
              pattern="[0-9]*"
              min="0"
              max="59"
              value="0"
            />
          </div>
          <div class="timeUnit">
            <label for="secondsInput">Seconds</label>
            <input
              type="number"
              id="secondsInput"
              inputmode="numeric"
              pattern="[0-9]*"
              min="0"
              max="59"
              value="0"
            />
          </div>
          <button class="addTimeButton" id="addTimeButton">ADD TIME</button>
        </div>
      </section>
    </main>
    <script src="./src/scripts/timerDOM.js" type="module"></script>
    <script src="./src/scripts/navigation.js" type="module"></script>
    <script src="./src/scripts/training.js" type="module"></script>
    <script src="./src/scripts/statsDisplayDOM.js" type="module"></script>
    <script src="./src/scripts/settingsDOM.js" type="module"></script>
    <script src="./src/scripts/addTimeDOM.js" type="module"></script>
    <script src="swCall.js"></script>    
  </body>
</html>
